version: 0.2

env:
  variables:
    CONTAINER_NAME: "web"                    # Nome exato do container na Task Definition
    IMAGE_REPO_NAME: "demo-java-aws"         # <<< MUDE AQUI se o nome do seu repo no ECR for diferente
    IMAGE_TAG: "latest"

phases:
  install:
    runtime-versions:
      java: corretto21

  pre_build:
    commands:
      - echo "=== Iniciando login no Amazon ECR ==="     
      - aws --version
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo "=== Build iniciado em $(date) ==="
      
      # Build Maven
      - echo "Executando Maven clean package..."
      - mvn clean package -DskipTests
      
      # Definir URI do repositório e build da imagem Docker
      - echo "Construindo imagem Docker..."
      - REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo "=== Build finalizado em $(date) ==="
      
      - REPOSITORY_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME"
      
      # Push da imagem
      - echo "Fazendo push da imagem para o ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      
      # Gerar imagedefinitions.json (obrigatório para CodePipeline → ECS)
      - echo "Gerando imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json